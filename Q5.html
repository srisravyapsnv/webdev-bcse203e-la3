<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
    </head>

    <body>
        <h1>Simple Calculator</h1> 
        Enter Number 1: <input type = "number" step = "any" id = "num-1"><br><br>
        Enter Number 2: <input type = "number" step = "any" id = "num-2"><br><br>
        <button onclick = "calculateVal('add')">Add</button>
        <button onclick = "calculateVal('sub')">Subtract</button>
        <button onclick = "calculateVal('mul')">Multiply</button>
        <button onclick = "calculateVal('div')">Divide</button>
        <p id = "result"></p>
        <p>P S N V Sri Sravya, 24BCE2267</p>
    </body>

    <script>
        function calculateVal(op)
        {
            var num1 = parseFloat(document.getElementById("num-1").value);
            var num2 = parseFloat(document.getElementById("num-2").value);
            var result;

            switch(op)
            {
                case 'add':
                result = num1 + num2;
                break;

                case 'sub':
                result = num1 - num2;
                break;

                case 'mul':
                result = num1 * num2;
                break;

                case 'div':
                if (num2 != 0)
                {
                    result = num1 / num2;
                }
                else
                {
                    result = "Enter Valid Numbers!!";
                }
                break;

                default:
                result = "Choose Valid Operation!!";
                break;
            }

            document.getElementById("result").innerHTML = "Result: " + result;
            document.getElementById("num-1").value = '';
            document.getElementById("num-2").value = '';
        }
    </script>
</html>
