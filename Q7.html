<!DOCTYPE html>
<html>
    <head>
        <title>Print N numbers</title>
    </head>

    <body>
        <h1>Print N Numbers</h1>
        Enter the Value of N:
        <input type = number id = "num"><br><br>
        <button type = "button" id = "print-btn" onclick="printNum()">Print</button>
        <p id = "print-num"></p>
        <p>P S N V Sri Sravya, 24BCE2267</p>
    </body>

    <script>
        function printNum() {
            var n = document.getElementById("num").value;
            var k = document.getElementById("print-num");
            var i = 1;
            k.innerHTML = "";
            n = parseInt(n);
            while (i <= n)
            {
                k.innerHTML += i + " "
                i++;
            }   
            i = 1;
        }
    </script>
</html>
