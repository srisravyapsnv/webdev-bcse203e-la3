<!DOCTYPE html>
<html>
    <head>
        <title>Overlapping Image Gallery</title>
        <style>
            .container {
                position: relative;
                width: 400px;
                height: 300px;
            }
            img {
                position: absolute;
                width: 500px;
                cursor: pointer;
            } 
            #img-1 {
                top: 100px;
                left: 200px;
            }
            #img-2 {
                top: 10px;
                left: 350px;
            }
            #img-3 {
                top:100px;
                left: 10px;
            }
        </style>
    </head>

    <body>
        <div class = "container">
            <img id = "img-1" src = "https://images.unsplash.com/photo-1601979031925-424e53b6caaa?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" onclick="Front(this)" width = "500px">
            <img id = "img-2" src = "https://images.unsplash.com/photo-1618359057154-e21ae64350b6?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" onclick="Front(this)" width = "700px">
            <img id = "img-3" src = "https://images.unsplash.com/photo-1560807707-8cc77767d783?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" onclick="Front(this)" width = "500px">
            <h3>P S N V Sri Sravya, 24BCE2267</h3>
        </div>

        <script>
            let topIndex = 0;
            function Front(img)
            {
                img.style.zIndex = ++topIndex;
            }
        </script>
    </body>
</html>
