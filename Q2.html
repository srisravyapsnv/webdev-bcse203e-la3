<!DOCTYPE html>
<html>
    <head>
        <title>Change Background Colour</title>
    </head>
    <body>
        Change the Background Color:<br>
        <button onclick = "changeColor('blue')">Blue</button>
        <button onclick = "changeColor('lightblue')">Light Blue</button>
        <button onclick = "changeColor('grey')">grey</button>
        <h3>P S N V Sri Sravya, 24BCE2267</h3>
    </body>
    
    <script>
        function changeColor(color)
        {
            document.body.style.backgroundColor = color;
        }
    </script>
</html>
